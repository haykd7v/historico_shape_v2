name: Historico Shape

on:
  push:
    branches: ["main"]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ghcr.io/dados-rioonibus/historico-shape

jobs:
  build-and-push:
    name: Build e Push Imagem Python
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write 

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login no GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extrair metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest

      - name: Build e Push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  deploy:
    name: Deploy na VM GCP
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_PRIVATE_KEY }}
          envs: IMAGE_NAME
          script: |
            set -e
            cd ${{ secrets.VM_DEPLOY_PATH }}
            
            # Login usando o PAT (mais estável para acesso externo à VM)
            echo "${{ secrets.GH_PAT }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            
            # Pull explícito da imagem correta
            echo "Fazendo pull da imagem $IMAGE_NAME:latest..."
            docker pull $IMAGE_NAME:latest
            
            # Reinicia os serviços. 
            # Lembre-se: o docker-compose.yml na VM DEVE usar ghcr.io/dados-rioonibus/...
            docker compose up -d --remove-orphans
            
            # Limpa imagens antigas para não encher o disco da VM
            docker image prune -f
            
            echo "Deploy do Ingest-Hub concluído com sucesso!"